<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Detail — PageTurn</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="api.js"></script>
  <script>renderNav('catalog');</script>

  <div class="page">
    <div class="breadcrumb">
      <a href="index.html">Home</a> <i class="fa-solid fa-chevron-right" style="font-size:0.7rem"></i> <a href="catalog.html">Books</a> <i class="fa-solid fa-chevron-right" style="font-size:0.7rem"></i> <span id="bc-title">Loading...</span>
    </div>

    <div id="content">
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const bookId = new URLSearchParams(window.location.search).get('id');

    async function loadBook() {
      if (!bookId) {
        document.getElementById('content').innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-xmark"></i> No book ID provided. <a href="catalog.html">Go back to catalog</a></div>`;
        return;
      }

      try {
        const b = await apiFetch(`/books/${bookId}`);
        document.title = `${b.title} — PageTurn`;
        document.getElementById('bc-title').textContent = b.title;

        document.getElementById('content').innerHTML = `
          <div class="book-detail">
            <div>
              <div class="book-detail-cover" style="background:${bookCoverColors(b.id)}">
                ${b.cover_url ? `<img src="${b.cover_url}" alt="${b.title}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius)">` : `<span><i class="fa-solid ${categoryIcon(b.category)}" style="font-size:5rem"></i></span>`}
              </div>
            </div>

            <div class="book-detail-info">
              <div class="book-category" style="font-size:0.85rem;margin-bottom:0.5rem">${b.category || 'General'}</div>
              <h1>${b.title}</h1>
              <div class="book-detail-author">by <strong>${b.author}</strong></div>

              <div class="book-detail-meta">
                ${b.rating   ? `<span class="meta-chip"><i class="fa-solid fa-star" style="color:var(--accent)"></i> ${b.rating} Rating</span>` : ''}
                ${b.pages    ? `<span class="meta-chip"><i class="fa-solid fa-file-lines"></i> ${b.pages} pages</span>` : ''}
                ${b.isbn     ? `<span class="meta-chip"><i class="fa-solid fa-barcode"></i> ISBN: ${b.isbn}</span>` : ''}
                ${b.stock !== undefined ? `<span class="meta-chip ${b.stock > 0 ? '' : 'style="background:#fef2f2;color:#dc2626"'}">${b.stock > 0 ? `<i class="fa-solid fa-circle-check" style="color:var(--success)"></i> In Stock (${b.stock})` : '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i> Out of Stock'}</span>` : ''}
              </div>

              <p class="book-detail-description">${b.description || 'No description available for this book.'}</p>

              <div class="book-detail-price">${formatPrice(b.price)}</div>

              <div class="book-detail-actions">
                <button class="btn btn-primary btn-lg" id="add-cart-btn" onclick="addToCart(${b.id})" ${b.stock === 0 ? 'disabled' : ''}>
                  <i class="fa-solid fa-cart-plus"></i> Add to Cart
                </button>
                <a href="cart.html" class="btn btn-secondary btn-lg"><i class="fa-solid fa-cart-shopping"></i> View Cart</a>
              </div>

              <div id="cart-alert" style="margin-top:1rem"></div>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="alert alert-error"><i class="fa-solid fa-circle-xmark"></i> ${err.message}. <a href="catalog.html">Back to catalog</a></div>`;
      }
    }

    async function addToCart(id) {
      if (!requireAuth()) return;

      const btn = document.getElementById('add-cart-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Adding...';

      try {
        await apiFetch('/cart/items', {
          method: 'POST',
          body: JSON.stringify({ book_id: id, quantity: 1 }),
        });
        showToast('Added to cart!', 'success');
        btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Added!';
        btn.style.background = 'var(--success)';
        await updateCartBadge();
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> Add to Cart';
          btn.style.background = '';
        }, 2000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-cart-plus"></i> Add to Cart';
      }
    }

    loadBook();
  </script>
</body>
</html>
